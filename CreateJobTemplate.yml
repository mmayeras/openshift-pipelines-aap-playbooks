---
- name: Create Execution Environments
  hosts: localhost
  connection: local
  gather_facts: false
  module_defaults:
    ansible.controller.execution_environment:
      controller_oauthtoken: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          30613031343835353866643336623763336463303734616236383761343634313332623931663234
          6133393466353032303130636263353566353963323861320a396539323834396564616130383063
          38336334363131383832666666333263303437343636643731336362366634343835396237626131
          3262336632306234340a396561333363653832346335373166633664363933663762353937306466
          63633838363239616664373961623464356363356233643839333465396266373761
      controller_host: http://aac-service.ansible-automation-platform/ 
  vars:
    job_templates:
      - name: Create Linux Machine on AWS
        job_type: run
        credentials:
          - Vault Credential
        project: "openshift-pipelines-aap-playbooks"
        playbook: "DeployLinuxAWS.yml"
        state: present
        inventory: "Demo Inventory"

  tasks:
    - name: Add Execution environements
      ansible.controller.job_template:
        name: "{{ template.name }}"
        job_type: "{{ template.job_type }}"
        credentials: "{{ template.credentials }}"
        project: "{{ template.project }}"
        state: "{{ template.state }}"
        inventory: "{{ template.inventory }}"
        
        
      loop: "{{ job_templates }}"
      loop_control:
        loop_var: template